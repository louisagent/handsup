<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="200"/>
  
  <!-- Raised hand silhouette - simplified stylised shape -->
  <!-- Palm base -->
  <rect x="380" y="520" width="264" height="280" rx="40" fill="url(#hand)"/>
  
  <!-- Fingers -->
  <!-- Index finger -->
  <rect x="390" y="280" width="68" height="280" rx="34" fill="url(#hand)"/>
  <!-- Middle finger -->
  <rect x="478" y="240" width="68" height="320" rx="34" fill="url(#hand)"/>
  <!-- Ring finger -->
  <rect x="566" y="270" width="68" height="290" rx="34" fill="url(#hand)"/>
  <!-- Pinky -->
  <rect x="654" y="320" width="55" height="230" rx="27" fill="url(#hand)"/>
  <!-- Thumb -->
  <rect x="300" y="440" width="110" height="55" rx="27" fill="url(#hand)"/>
  
  <!-- Sound wave arcs emanating from hand -->
  <path d="M 730 350 Q 800 450 730 550" stroke="url(#wave)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 770 300 Q 880 450 770 600" stroke="url(#wave)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 810 260 Q 960 450 810 640" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Small musical note -->
  <circle cx="220" cy="380" r="28" fill="#8B5CF6" opacity="0.7"/>
  <rect x="244" y="280" width="12" height="108" rx="6" fill="#8B5CF6" opacity="0.7"/>
  <path d="M 244 280 Q 290 265 290 290 Q 290 315 244 308" fill="#8B5CF6" opacity="0.7"/>
</svg>
