<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844">
  <defs>
    <radialGradient id="uploadGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="thumbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1228"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0D0D0D"/>
  <rect width="390" height="844" fill="url(#uploadGlow)"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0D0D0D"/>
  <text x="20" y="30" fill="white" font-size="13" font-weight="600" font-family="sans-serif">9:41</text>
  <rect x="318" y="20" width="42" height="12" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="319" y="21" width="28" height="10" rx="2" fill="white"/>
  <rect x="361" y="23" width="3" height="6" rx="1" fill="white"/>

  <!-- ── HEADLINE OVERLAY ── -->
  <rect width="390" height="170" fill="#0D0D0D"/>
  <text x="20" y="78" fill="white" font-size="28" font-weight="800" font-family="sans-serif">Film something great?</text>
  <text x="20" y="110" fill="white" font-size="28" font-weight="800" font-family="sans-serif">Tag it. Share it forever.</text>
  <text x="20" y="145" fill="#A78BFA" font-size="13" font-family="sans-serif">Upload in seconds. Earn credits. Get recognised.</text>

  <!-- ── APP UI ── -->

  <!-- Page title -->
  <text x="20" y="198" fill="white" font-size="22" font-weight="800" font-family="sans-serif">Upload a clip</text>

  <!-- ── VIDEO PREVIEW THUMBNAIL ── -->
  <rect x="16" y="212" width="358" height="200" rx="14" fill="url(#thumbGrad)" stroke="#222222" stroke-width="1"/>
  <!-- Stage atmosphere in thumbnail -->
  <ellipse cx="195" cy="295" rx="100" ry="50" fill="#8B5CF6" fill-opacity="0.25"/>
  <ellipse cx="100" cy="300" rx="60" ry="30" fill="#7C3AED" fill-opacity="0.15"/>
  <ellipse cx="290" cy="300" rx="60" ry="30" fill="#A78BFA" fill-opacity="0.15"/>
  <!-- Play icon overlay -->
  <circle cx="195" cy="312" r="28" fill="rgba(0,0,0,0.6)"/>
  <polygon points="187,300 187,324 211,312" fill="white"/>
  <!-- Duration badge -->
  <rect x="308" y="385" width="56" height="20" rx="6" fill="rgba(0,0,0,0.75)"/>
  <text x="317" y="399" fill="white" font-size="11" font-family="sans-serif">3:42 ▶</text>
  <!-- Change video button -->
  <rect x="16" y="390" width="100" height="22" rx="6" fill="rgba(0,0,0,0.75)"/>
  <text x="25" y="405" fill="#A78BFA" font-size="11" font-family="sans-serif">✏ Change video</text>

  <!-- ── FORM FIELDS ── -->

  <!-- Artist field -->
  <text x="20" y="440" fill="#AAAAAA" font-size="12" font-weight="600" font-family="sans-serif" letter-spacing="1">ARTIST / PERFORMER</text>
  <rect x="16" y="450" width="358" height="44" rx="10" fill="#161616" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="28" y="477" fill="white" font-size="15" font-family="sans-serif">Tame Impala</text>

  <!-- Festival field -->
  <text x="20" y="516" fill="#AAAAAA" font-size="12" font-weight="600" font-family="sans-serif" letter-spacing="1">FESTIVAL</text>
  <rect x="16" y="526" width="358" height="44" rx="10" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="28" y="553" fill="white" font-size="15" font-family="sans-serif">Laneway Festival</text>

  <!-- Location + Date row -->
  <text x="20" y="592" fill="#AAAAAA" font-size="12" font-weight="600" font-family="sans-serif" letter-spacing="1">LOCATION</text>
  <rect x="16" y="602" width="170" height="44" rx="10" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="28" y="629" fill="white" font-size="15" font-family="sans-serif">Sydney, AU</text>

  <text x="210" y="592" fill="#AAAAAA" font-size="12" font-weight="600" font-family="sans-serif" letter-spacing="1">DATE</text>
  <rect x="204" y="602" width="170" height="44" rx="10" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="216" y="629" fill="white" font-size="15" font-family="sans-serif">18 Jan 2026</text>

  <!-- ── UPLOAD PROGRESS ── -->
  <text x="20" y="672" fill="#AAAAAA" font-size="12" font-weight="600" font-family="sans-serif" letter-spacing="1">UPLOADING...</text>
  <rect x="16" y="682" width="358" height="8" rx="4" fill="#222222"/>
  <rect x="16" y="682" width="215" height="8" rx="4" fill="url(#progressGrad)"/>
  <!-- Progress text -->
  <text x="20" y="706" fill="#555555" font-size="11" font-family="sans-serif">60% · 28.4 MB of 47.2 MB</text>
  <text x="350" y="706" fill="#8B5CF6" font-size="11" font-weight="600" font-family="sans-serif" text-anchor="end">Fast ⚡</text>

  <!-- Upload button (in-progress state) -->
  <rect x="16" y="720" width="358" height="50" rx="14" fill="#161616" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="130" y="750" fill="#8B5CF6" font-size="16" font-weight="700" font-family="sans-serif">⬆ Uploading... 60%</text>

  <!-- ── BOTTOM TAB BAR ── -->
  <rect x="0" y="780" width="390" height="64" fill="#0D0D0D"/>
  <rect x="0" y="780" width="390" height="1" fill="#222222"/>

  <text x="28" y="808" font-size="18" font-family="sans-serif">🏠</text>
  <text x="22" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">HOME</text>

  <text x="107" y="808" font-size="18" font-family="sans-serif">🔍</text>
  <text x="101" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">SEARCH</text>

  <!-- Upload tab (active) -->
  <circle cx="195" cy="800" r="26" fill="#8B5CF6"/>
  <text x="183" y="807" font-size="20" font-family="sans-serif">🙌</text>
  <rect x="182" y="778" width="26" height="3" rx="1" fill="white"/>

  <text x="262" y="808" font-size="18" font-family="sans-serif">🎪</text>
  <text x="257" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">EVENTS</text>

  <text x="340" y="808" font-size="18" font-family="sans-serif">👤</text>
  <text x="333" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">PROFILE</text>

  <rect x="150" y="836" width="90" height="4" rx="2" fill="#333333"/>
</svg>
