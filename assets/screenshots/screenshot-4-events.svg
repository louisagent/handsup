<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844">
  <defs>
    <radialGradient id="eventGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="festivalCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a30"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="cardOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="30%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="844" fill="#0D0D0D"/>
  <rect width="390" height="844" fill="url(#eventGlow)"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0D0D0D"/>
  <text x="20" y="30" fill="white" font-size="13" font-weight="600" font-family="sans-serif">9:41</text>
  <rect x="318" y="20" width="42" height="12" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="319" y="21" width="28" height="10" rx="2" fill="white"/>
  <rect x="361" y="23" width="3" height="6" rx="1" fill="white"/>

  <!-- ── HEADLINE OVERLAY ── -->
  <rect width="390" height="170" fill="#0D0D0D"/>
  <text x="20" y="78" fill="white" font-size="28" font-weight="800" font-family="sans-serif">Browse festivals.</text>
  <text x="20" y="110" fill="white" font-size="28" font-weight="800" font-family="sans-serif">Discover what was captured.</text>
  <text x="20" y="145" fill="#A78BFA" font-size="13" font-family="sans-serif">From Laneway to Coachella — every event, every clip.</text>

  <!-- ── APP UI ── -->

  <!-- Page title + filter -->
  <text x="20" y="198" fill="white" font-size="22" font-weight="800" font-family="sans-serif">Events</text>
  <rect x="298" y="180" width="76" height="28" rx="8" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="313" y="199" fill="#AAAAAA" font-size="12" font-family="sans-serif">🗺 Nearby</text>

  <!-- Category filter pills -->
  <rect x="16" y="210" width="76" height="30" rx="15" fill="#8B5CF6"/>
  <text x="28" y="230" fill="white" font-size="12" font-weight="600" font-family="sans-serif">All Events</text>

  <rect x="104" y="210" width="90" height="30" rx="15" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="118" y="230" fill="#AAAAAA" font-size="12" font-family="sans-serif">Upcoming</text>

  <rect x="206" y="210" width="80" height="30" rx="15" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="220" y="230" fill="#AAAAAA" font-size="12" font-family="sans-serif">Australia</text>

  <rect x="298" y="210" width="76" height="30" rx="15" fill="#161616" stroke="#333333" stroke-width="1"/>
  <text x="312" y="230" fill="#AAAAAA" font-size="12" font-family="sans-serif">Europe</text>

  <!-- ── FESTIVAL CARD 1 — LANEWAY ── -->
  <rect x="16" y="254" width="358" height="150" rx="14" fill="url(#festivalCard)" stroke="#222222" stroke-width="1"/>
  <!-- Festival visual atmosphere -->
  <ellipse cx="195" cy="310" rx="120" ry="55" fill="#8B5CF6" fill-opacity="0.15"/>
  <ellipse cx="100" cy="320" rx="70" ry="35" fill="#7C3AED" fill-opacity="0.12"/>
  <!-- Card overlay gradient -->
  <rect x="16" y="254" width="358" height="150" rx="14" fill="url(#cardOverlay)"/>
  <!-- Festival info -->
  <rect x="28" y="263" width="70" height="20" rx="5" fill="#8B5CF6"/>
  <text x="34" y="278" fill="white" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="1">UPCOMING</text>
  <text x="28" y="350" fill="white" font-size="20" font-weight="800" font-family="sans-serif">Laneway Festival</text>
  <text x="28" y="372" fill="#A78BFA" font-size="13" font-family="sans-serif">Sydney · January 2026 · 47 clips</text>
  <!-- Clip count badge -->
  <rect x="296" y="344" width="68" height="24" rx="6" fill="rgba(0,0,0,0.6)"/>
  <text x="305" y="361" fill="white" font-size="12" font-family="sans-serif">🎬 47 clips</text>

  <!-- ── FESTIVAL CARD 2 — SPLENDOUR ── -->
  <rect x="16" y="418" width="358" height="150" rx="14" fill="#12101a" stroke="#222222" stroke-width="1"/>
  <ellipse cx="250" cy="475" rx="100" ry="50" fill="#7C3AED" fill-opacity="0.2"/>
  <ellipse cx="120" cy="480" rx="80" ry="40" fill="#A78BFA" fill-opacity="0.1"/>
  <rect x="16" y="418" width="358" height="150" rx="14" fill="url(#cardOverlay)"/>
  <rect x="28" y="427" width="86" height="20" rx="5" fill="#7C3AED"/>
  <text x="34" y="442" fill="white" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="1">LAST WEEKEND</text>
  <text x="28" y="514" fill="white" font-size="20" font-weight="800" font-family="sans-serif">Splendour in the Grass</text>
  <text x="28" y="536" fill="#A78BFA" font-size="13" font-family="sans-serif">Byron Bay · July 2026 · 128 clips</text>
  <rect x="284" y="508" width="80" height="24" rx="6" fill="rgba(0,0,0,0.6)"/>
  <text x="293" y="525" fill="white" font-size="12" font-family="sans-serif">🎬 128 clips</text>

  <!-- ── FESTIVAL CARD 3 (partial) ── -->
  <rect x="16" y="582" width="358" height="100" rx="14" fill="#0f0d18" stroke="#222222" stroke-width="1"/>
  <ellipse cx="150" cy="625" rx="90" ry="40" fill="#8B5CF6" fill-opacity="0.12"/>
  <rect x="16" y="582" width="358" height="100" rx="14" fill="url(#cardOverlay)"/>
  <rect x="28" y="591" width="78" height="20" rx="5" fill="#333333"/>
  <text x="34" y="606" fill="#AAAAAA" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="1">COACHELLA</text>
  <text x="28" y="650" fill="white" font-size="20" font-weight="800" font-family="sans-serif">Coachella Valley Music Festival</text>
  <text x="28" y="670" fill="#A78BFA" font-size="13" font-family="sans-serif">Indio, CA · April 2026 · 312 clips</text>

  <!-- ── BOTTOM TAB BAR ── -->
  <rect x="0" y="780" width="390" height="64" fill="#0D0D0D"/>
  <rect x="0" y="780" width="390" height="1" fill="#222222"/>

  <text x="28" y="808" font-size="18" font-family="sans-serif">🏠</text>
  <text x="22" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">HOME</text>

  <text x="107" y="808" font-size="18" font-family="sans-serif">🔍</text>
  <text x="101" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">SEARCH</text>

  <circle cx="195" cy="800" r="26" fill="#8B5CF6"/>
  <text x="183" y="807" font-size="20" font-family="sans-serif">🙌</text>

  <!-- Events tab (active) -->
  <text x="262" y="808" font-size="18" font-family="sans-serif">🎪</text>
  <text x="257" y="832" fill="#8B5CF6" font-size="9" font-weight="600" font-family="sans-serif" letter-spacing="0.5">EVENTS</text>
  <rect x="260" y="778" width="22" height="3" rx="1" fill="#8B5CF6"/>

  <text x="340" y="808" font-size="18" font-family="sans-serif">👤</text>
  <text x="333" y="832" fill="#555555" font-size="9" font-family="sans-serif" letter-spacing="0.5">PROFILE</text>

  <rect x="150" y="836" width="90" height="4" rx="2" fill="#333333"/>
</svg>
